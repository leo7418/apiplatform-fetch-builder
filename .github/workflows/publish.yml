name: Publish

on:
  push:
    tags:
      - v[0-9]*

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - run: pnpm install

      - run: pnpm lint && pnpm test

  publish:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "pnpm"

      - run: pnpm install

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npm publish ./dist --provenance --access public
