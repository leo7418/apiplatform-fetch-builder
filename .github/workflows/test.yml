name: Test

on:
  push:
    branches:
      - "main"
    tags-ignore:
      - "*"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - run: pnpm install

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build
